name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage gate
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "total coverage: ${total}%"
          awk -v c="$total" 'BEGIN { exit (c+0 >= 80) ? 0 : 1 }' \
            || { echo "coverage ${total}% < 80%" >&2; exit 1; }
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
