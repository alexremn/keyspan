name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release + upload assets
      id-token: write        # cosign keyless signing + provenance OIDC
      attestations: write    # store SLSA build provenance attestations
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
      - uses: sigstore/cosign-installer@v3.9.1
      - uses: anchore/sbom-action/download-syft@v0.24.0
      - name: goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Push the generated cask to alexremn/homebrew-tap (PAT with repo scope).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      # SLSA build provenance over every released artifact. Reads goreleaser's
      # checksums.txt (sha256sum format) so one attestation covers all archives.
      # Verify: gh attestation verify <archive> --repo alexremn/keyspan
      - uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-checksums: dist/checksums.txt
