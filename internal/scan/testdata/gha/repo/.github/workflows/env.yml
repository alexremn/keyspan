name: env-indirection
on: push
env:
  GLOBAL_TOKEN: ${{ secrets.GLOBAL_SECRET }}
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      JOB_KEY: ${{ secrets.JOB_SECRET }}
    steps:
      - name: publish
        env:
          STEP_KEY: ${{ secrets.STEP_SECRET }}
        run: publish.sh --token=${{ env.STEP_KEY }} --job=${{ env.JOB_KEY }} --global=${{ env.GLOBAL_TOKEN }}
      - name: noenv
        run: echo "${{ env.UNDEFINED_KEY }}"
