version: 2

project_name: keyspan

before:
  hooks:
    - go mod tidy

builds:
  - id: keyspan
    main: ./cmd/keyspan
    binary: keyspan
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: keyspan
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document", "--enrich", "all"]
    documents:
      - "${artifact}.spdx.json"

signs:
  - id: checksum-cosign
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# homebrew_casks (brews: is deprecated for pre-built CLI binaries). The single
# `keyspan` binary is auto-detected from the archive and placed on PATH.
homebrew_casks:
  - name: keyspan
    repository:
      owner: alexremn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/alexremn/keyspan
    description: "Secret blast-radius graph: if I rotate this credential, what breaks and who owns it?"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    # Strip the macOS quarantine xattr so the unsigned binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/keyspan"]
          end

release:
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
