name: ci
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DB_PASS: ${{ secrets.DATABASE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: migrate
        run: DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} ./migrate.sh
      - name: deploy
        run: ./deploy.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
